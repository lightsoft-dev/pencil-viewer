<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencil.dev — 실시간 협업 디자인 뷰어</title>
    <meta name="description" content="Pencil.dev 실시간 협업 디자인 뷰어 — .pen 파일을 열어보고 팀과 함께 협업하세요.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ============ Splash Screen ============ -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg class="logo-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
                    <path d="M12 28L16 12H20L24 28H20.5L19.5 24H16.5L15.5 28H12ZM17 21H19L18 15.5L17 21Z" fill="white"/>
                    <circle cx="28" cy="14" r="4" fill="#FFE66D"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#6C5CE7"/>
                            <stop offset="1" stop-color="#A29BFE"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="splash-title"><span>Pencil</span>.dev</div>
            </div>
            <div class="splash-loader">
                <div class="loader-bar"><div class="loader-fill"></div></div>
            </div>
            <p class="splash-subtitle">실시간 협업 디자인 뷰어</p>
        </div>
    </div>

    <!-- ============ Main App ============ -->
    <div id="app" class="app hidden">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <div class="logo-small">
                    <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="10" fill="url(#logoGrad2)"/>
                        <path d="M12 28L16 12H20L24 28H20.5L19.5 24H16.5L15.5 28H12ZM17 21H19L18 15.5L17 21Z" fill="white"/>
                        <circle cx="28" cy="14" r="4" fill="#FFE66D"/>
                        <defs>
                            <linearGradient id="logoGrad2" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#6C5CE7"/>
                                <stop offset="1" stop-color="#A29BFE"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="file-info">
                    <span id="file-name" class="file-name">제목 없음</span>
                    <span class="file-badge">.PEN</span>
                </div>
                <div id="room-status" class="room-status" style="display:none">
                    <span class="status-dot live"></span> 실시간 공유 중
                </div>
            </div>

            <div class="zoom-controls">
                <button id="zoom-out-btn" class="zoom-btn" title="축소">
                    <span class="material-symbols-rounded">remove</span>
                </button>
                <span id="zoom-level" class="zoom-level">100%</span>
                <button id="zoom-in-btn" class="zoom-btn" title="확대">
                    <span class="material-symbols-rounded">add</span>
                </button>
                <button id="zoom-fit-btn" class="zoom-btn" title="화면에 맞추기">
                    <span class="material-symbols-rounded">fit_screen</span>
                </button>
            </div>

            <div class="top-bar-right">
                <button id="layers-toggle-btn" class="icon-btn active" title="레이어">
                    <span class="material-symbols-rounded">layers</span>
                </button>
                <button id="comment-mode-btn" class="icon-btn" title="코멘트">
                    <span class="material-symbols-rounded">chat_bubble</span>
                    <span id="comment-count" class="comment-count-badge" style="display:none">0</span>
                </button>
                <div id="collaborators" class="collaborators"></div>
                <button id="share-btn" class="icon-btn share-btn" title="공유">
                    <span class="material-symbols-rounded">share</span>
                    <span>공유</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Layers Panel (Left) -->
            <aside id="layers-panel" class="layers-panel">
                <div class="panel-header">
                    <h3><span class="material-symbols-rounded">layers</span> 레이어</h3>
                    <button id="layers-close-btn" class="panel-close-btn">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div class="layers-search">
                    <span class="material-symbols-rounded">search</span>
                    <input id="layer-search-input" type="text" placeholder="레이어 검색…">
                </div>
                <div id="layers-tree" class="layers-tree"></div>
            </aside>

            <!-- Canvas -->
            <section id="canvas-container" class="canvas-container">
                <!-- Empty State -->
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">
                        <span class="material-symbols-rounded">draft</span>
                    </div>
                    <h2>.pen 파일을 열어보세요</h2>
                    <p>파일을 드래그 앤 드롭하거나<br>아래 버튼을 클릭하세요.</p>
                    <button id="open-file-btn" class="primary-btn">
                        <span class="material-symbols-rounded">folder_open</span>
                        파일 열기
                    </button>
                    <input id="file-input" type="file" accept=".pen,.json" style="display:none">
                    <button id="load-demo-btn" class="text-btn demo-link">데모 파일로 시작하기 →</button>
                </div>

                <!-- Canvas Viewport (SVG) -->
                <div id="canvas-viewport" class="canvas-viewport" style="display:none">
                    <svg id="canvas-svg" class="canvas-svg">
                        <defs>
                            <pattern id="grid-small" width="10" height="10" patternUnits="userSpaceOnUse">
                                <path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
                            </pattern>
                            <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
                                <rect width="100" height="100" fill="url(#grid-small)"/>
                                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
                            </pattern>
                        </defs>
                        <rect class="canvas-grid" width="100%" height="100%" fill="url(#grid-large)"/>
                        <g id="canvas-content"></g>
                        <g id="comments-layer"></g>
                        <g id="cursors-layer"></g>
                    </svg>
                </div>

                <!-- Drop Overlay -->
                <div id="drop-overlay" class="drop-overlay">
                    <div class="drop-content">
                        <span class="material-symbols-rounded">upload_file</span>
                        <p>여기에 .pen 파일을 놓으세요</p>
                    </div>
                </div>
            </section>

            <!-- Properties Panel (Right) -->
            <aside id="properties-panel" class="properties-panel" style="display:none">
                <div class="panel-header">
                    <h3><span class="material-symbols-rounded">tune</span> 속성</h3>
                    <button id="props-close-btn" class="panel-close-btn">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div id="props-content" class="props-content"></div>
            </aside>

            <!-- Comments Panel (Right Overlay) -->
            <aside id="comments-panel" class="comments-panel" style="display:none">
                <div class="panel-header">
                    <h3><span class="material-symbols-rounded">chat_bubble</span> 코멘트</h3>
                    <button id="comments-close-btn" class="panel-close-btn">
                        <span class="material-symbols-rounded">close</span>
                    </button>
                </div>
                <div class="comments-panel-hint">
                    <span class="material-symbols-rounded">info</span>
                    캔버스를 클릭하여 코멘트를 달아보세요
                </div>
                <div id="comments-list" class="comments-list"></div>
            </aside>
        </main>
    </div>

    <!-- ============ Share Modal ============ -->
    <div id="share-modal" class="share-modal" style="display:none">
        <div class="share-modal-content">
            <div class="share-modal-header">
                <h2><span class="material-symbols-rounded">group</span> 실시간 공유</h2>
                <button id="share-modal-close" class="panel-close-btn">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>
            <div class="share-modal-body">
                <div class="share-section">
                    <label class="share-label">내 닉네임</label>
                    <input id="nickname-input" type="text" class="share-input" placeholder="닉네임">
                </div>
                <div class="share-section">
                    <label class="share-label">공유 링크</label>
                    <p class="share-hint">이 링크를 팀원에게 보내면 실시간으로 같은 디자인을 볼 수 있습니다.</p>
                    <div class="share-input-group">
                        <input id="share-url-display" type="text" class="share-input share-url" readonly>
                        <button id="copy-link-btn" class="copy-btn" title="복사">
                            <span class="material-symbols-rounded">content_copy</span>
                            링크 복사
                        </button>
                    </div>
                </div>
                <div class="share-section">
                    <label class="share-label">방 ID</label>
                    <span id="room-id-display" class="room-id-text"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ Toast Container ============ -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="pen-renderer.js"></script>
    <script src="realtime.js"></script>
    <script src="app.js"></script>
</body>
</html>
